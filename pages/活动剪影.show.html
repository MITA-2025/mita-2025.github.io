<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- MITA's Website Style -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dropdown.css">
    <link rel="stylesheet" href="../assets/css/mainpage.css">
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/22e1239b05.js" crossorigin="anonymous"></script>
    <!-- KaTeX -->
    <script defer src="../assets/js/KaTeX.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <style>
        .back-btn {
            display: inline-flex;
            align-items: center;
            color: #2c4a7a;
            font-weight: 600;
            text-decoration: none;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #2c4a7a;
            color: white;
            transform: translateX(-5px);
        }
        .back-btn i {
            margin-right: 8px;
        }
        .carousel-container {
            position: relative;
            width: 100%;
            height: 500px;
            overflow: hidden;
            margin-bottom: 40px;
        }
        /* --- 核心修改：移除写死的 transform，基础定位定在绝对中心 --- */
        .slide {
            position: absolute;
            left: 50%;
            top: 50%;
            width: auto;
            height: auto;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
            opacity: 0;
            z-index: 0;
            /* 默认隐藏在中心并缩小 */
            transform: translate(-50%, -50%) scale(0.5); 
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .slide img {
            display: block;
            width: auto;
            height: 400px;
            max-width: 85vw;
            object-fit: contain;
            pointer-events: none;
        }
        /* CSS 仅控制层级和透明度，位置由 JS 动态计算 */
        .slide.active {
            opacity: 1;
            z-index: 3;
            box-shadow: 0 15px 35px rgba(44, 74, 122, 0.3);
        }
        .slide.prev, .slide.next {
            opacity: 0.6;
            z-index: 2;
        }
        .slide.hidden-left, .slide.hidden-right {
            opacity: 0;
            z-index: 1;
        }

        @media (max-width: 768px) {
            .carousel-container {
                height: 350px;
            }
            .slide img {
                height: 245px;
                max-width: 90vw;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">
                    <img src="../assets/images/MITA_Logo.png" style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <h1 style="color: #2c4a7a; font-size: 1.5rem;">数学与智能科技协会</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="../index.html"><i class="fa-solid fa-home"></i>&ensp;主页</a></li>
                    <li><a href="社团介绍.html"><i class="fa-solid fa-info"></i>&ensp;社团介绍</a></li>
                    <li><a href="#" class="current"><i class="fa-regular fa-images"></i>&ensp;活动剪影</a></li>
                    <li><a href="项目资源.html"><i class="fa-regular fa-folder-closed"></i>&ensp;项目资源</a></li>
                    <li><a href="加入MITA.html"><i class="fa-brands fa-qq"></i>&ensp;加入&#8239;MITA</a></li>
                    <li><a href="邮箱.html"><i class="fa-solid fa-envelope"></i></a></li>
                    <li><a href="微信公众号.html"><i class="fa-brands fa-weixin"></i></a></li>
                    <li><a href="https://github.com/MITA-2025"><i class="fa-brands fa-github"></i></a></li>
                    <li><a href="https://space.bilibili.com/3546981368596533"><i class="fa-brands fa-bilibili"></i></a></li>
                </ul>
            </nav>
        </header>
        <div class="mainpage-header">
            <h1 id="dynamic-title" class="mainpage-title"></h1>
        </div>
        <a href="活动剪影.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> 返回活动列表</a>
        <div class="carousel-container" id="carousel"></div>
        <footer>
            <p>© 2025 MITA 数学与智能科技协会</p>
        </footer>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const folderName = urlParams.get('folder') || 'activity1';
            const displayTitle = urlParams.get('title') || folderName;
            document.title = `MITA | ${folderName}`;
            document.getElementById('dynamic-title').innerText = displayTitle;
            const imageCountParam = urlParams.get('count');
            const count = imageCountParam ? parseInt(imageCountParam, 10) : 5;
            const CONFIG = {
                folderPath: `https://gitee.com/MITA-2025/MITA_Resource/raw/master/活动剪影/${folderName}/`,
                imageCount: count,
                autoPlaySpeed: 1500
            };
            const carousel = document.getElementById('carousel');
            let slides = [];
            let currentIndex = 0;
            for (let i = 1; i <= CONFIG.imageCount; i++) {
                const slideDiv = document.createElement('div');
                slideDiv.className = 'slide';
                const img = document.createElement('img');
                img.src = `${CONFIG.folderPath}${i}.jpg`;
                img.addEventListener('load', updateCarousel);
                slideDiv.appendChild(img);
                carousel.appendChild(slideDiv);
                slides.push(slideDiv);
                slideDiv.addEventListener('click', () => {
                    currentIndex = i - 1;
                    updateCarousel();
                    resetTimer();
                });
            }
            function updateCarousel() {
                const total = slides.length;
                if (total === 0) return;
                const isMobile = window.innerWidth <= 768;
                const gap = isMobile ? 15 : 30;
                const scaleSide = isMobile ? 0.85 : 0.65;
                const scaleHidden = 0.5;
                const activeSlide = slides[currentIndex];
                const w0 = activeSlide.offsetWidth || 300; 
                slides.forEach((slide, index) => {
                    slide.className = 'slide';
                    let relativeIndex = (index - currentIndex + total) % total;
                    const w = slide.offsetWidth || 300;
                    if (relativeIndex === 0) {
                        slide.classList.add('active');
                        slide.style.transform = `translate(-50%, -50%) scale(1)`;
                    } else if (relativeIndex === 1) {
                        slide.classList.add('next');
                        const offset = (w0 / 2) + gap + (w * scaleSide / 2);
                        slide.style.transform = `translate(calc(-50% + ${offset}px), -50%) scale(${scaleSide})`;
                    } else if (relativeIndex === total - 1) {
                        slide.classList.add('prev');
                        const offset = -((w0 / 2) + gap + (w * scaleSide / 2));
                        slide.style.transform = `translate(calc(-50% + ${offset}px), -50%) scale(${scaleSide})`;

                    } else if (relativeIndex === 2) {
                        slide.classList.add('hidden-right');
                        const nextSlide = slides[(currentIndex + 1) % total];
                        const wNext = nextSlide.offsetWidth || 300;
                        const offsetNextCenter = (w0 / 2) + gap + (wNext * scaleSide / 2);
                        const offset = offsetNextCenter + (wNext * scaleSide / 2) + gap + (w * scaleHidden / 2);
                        slide.style.transform = `translate(calc(-50% + ${offset}px), -50%) scale(${scaleHidden})`;

                    } else if (relativeIndex === total - 2) {
                        slide.classList.add('hidden-left');
                        const prevSlide = slides[(currentIndex - 1 + total) % total];
                        const wPrev = prevSlide.offsetWidth || 300;
                        const offsetPrevCenter = -((w0 / 2) + gap + (wPrev * scaleSide / 2));
                        const offset = offsetPrevCenter - (wPrev * scaleSide / 2) - gap - (w * scaleHidden / 2);
                        slide.style.transform = `translate(calc(-50% + ${offset}px), -50%) scale(${scaleHidden})`;
                        
                    } else {
                        slide.classList.add('hidden-left');
                        slide.style.transform = `translate(calc(-50% - 1500px), -50%) scale(0.1)`;
                    }
                });
            }
            function nextSlide() {
                currentIndex = (currentIndex + 1) % slides.length;
                updateCarousel();
            }
            let playTimer = setInterval(nextSlide, CONFIG.autoPlaySpeed);
            function resetTimer() {
                clearInterval(playTimer);
                playTimer = setInterval(nextSlide, CONFIG.autoPlaySpeed);
            }
            if(slides.length > 0) updateCarousel();
            window.addEventListener('resize', updateCarousel);
        });
    </script>
</body>
</html>
